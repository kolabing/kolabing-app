name: kolabing_app
description: "Kolabing - Collaboration marketplace connecting businesses and communities"
publish_to: 'none'

version: 1.2.6+6

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.2.0

  # Backend
  supabase_flutter: ^2.3.0

  # Navigation
  go_router: ^17.0.1

  # UI Components
  lucide_icons: ^0.257.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

  # Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Image Picker
  image_picker: ^1.0.7

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # Auth
  google_sign_in: ^6.2.1

  # HTTP
  http: ^1.2.0

  # Firebase
  firebase_core: ^3.9.0
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.0

  # Local notifications (for foreground display on iOS)
  flutter_local_notifications: ^18.0.1

  # Apple Sign In
  sign_in_with_apple: ^7.0.1

  # In-App Purchase (iOS subscription)
  in_app_purchase: ^3.2.0

  # Utils
  intl: any
  url_launcher: ^6.2.2
  permission_handler: ^12.0.1
  geolocator: ^13.0.2

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Gamification / Rewards
  share_plus: ^10.1.4
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFD861"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
